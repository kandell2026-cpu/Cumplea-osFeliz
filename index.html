<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    function crearConfeti() 
    {
        const colores = ['#FFD700', '#00FFFF', '#FFFFFF', '#FF4500', '#ADFF2F'];
        for (let i = 0; i < 50; i++) 
        {
            const confeti = document.createElement('div');
            confeti.classList.add('confeti');
            confeti.style.left = Math.random() * 100 + 'vw';
            confeti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confeti.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
            document.body.appendChild(confeti);
            setTimeout(() => { confeti.remove(); }, 5000);
        }
    }
    setInterval(crearConfeti, 1000);

    const texto = "¡Feliz Cumpleaños Luis! 🥳🥳";
    let i = 0;

    function escribir() 
    {
        const elemento = document.getElementById("maquina-escribir");
        if (elemento && i < texto.length) {
            elemento.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, 150);
        }
    }

    window.onload = () => 
    {
        setTimeout(escribir, 1500);
    };
</script>
    <div class="container">  
        <div class="cake">
    <div class="plate"></div>
    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    <div class="icing"></div>
    <div class="drip drip1"></div>
    <div class="drip drip2"></div>
    <div class="drip drip3"></div>
    <div class="candle">
        <div class="flame"></div>
    </div>
</div>     
        <h1 class="texto-cumple" id="maquina-escribir"></h1>
    </div>
</body>
</html>
